<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit Converter</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-blue-600 text-white p-4 flex justify-center gap-6 text-lg font-semibold">
    <button onclick="showTab('weight')">Weight</button>
    <button onclick="showTab('distance')">Distance</button>
    <button onclick="showTab('temperature')">Temperature</button>
  </nav>

  <!-- MAIN CONTAINER -->
  <div class="max-w-xl mx-auto mt-10 bg-white shadow-lg rounded-xl p-6">

    <h1 class="text-2xl font-bold text-center mb-6">Unit Conversion Calculator</h1>

    <!-- WEIGHT TAB -->

    <div id="weight" class="tab hidden">
      <h2 class="text-xl font-semibold mb-4">Weight Converter (KG ↔ LB)</h2>

      <form onsubmit="convertWeight(); return false;">

        <label class="font-semibold">Single Value</label>
        <input id="weightSingle" class="border p-2 w-full mb-3" />
        <p class="text-xs text-gray-500 mb-4">For a single conversion</p>

        <label class="font-semibold">Batch conversions (comma separated)</label>
        <input id="weightArray" class="border p-2 w-full mb-3" />
        <p class="text-xs text-gray-500 mb-4">For multiple conversions</p>

        <label class="font-semibold">Direction</label>
        <select id="weightDirection" class="border p-2 w-full mb-3">
          <option value="kg-lb">KG → LB</option>
          <option value="lb-kg">LB → KG</option>
        </select>

        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg">
          Convert
        </button>

        <p id="weightResult"
          class="mt-4 p-4 bg-green-50 border border-green-300 text-green-800 rounded-lg font-semibold">
        </p>

      </form>
    </div>


    <!-- DISTANCE TAB -->
    <div id="distance" class="tab hidden">
      <h2 class="text-xl font-semibold mb-4">Distance Converter (KM ↔ MI)</h2>

      <form onsubmit="convertDistance(); return false;">

        <label class="font-semibold">Single Value</label>
        <input id="distanceSingle" class="border p-2 w-full mb-3" />
        <p class="text-xs text-gray-500 mb-4">For a single conversion</p>

        <label class="font-semibold">Batch conversions (comma separated)</label>
        <input id="distanceArray" class="border p-2 w-full mb-3" />
        <p class="text-xs text-gray-500 mb-4">For multiple conversions</p>

        <label class="font-semibold">Direction</label>
        <select id="distanceDirection" class="border p-2 w-full mb-3">
          <option value="km-mi">KM → MI</option>
          <option value="mi-km">MI → KM</option>
        </select>

        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg">
          Convert
        </button>

        <p id="distanceResult"
          class="mt-4 p-4 bg-green-50 border border-green-300 text-green-800 rounded-lg font-semibold">
        </p>

      </form>
    </div>


    <!-- TEMPERATURE TAB -->
    <div id="temperature" class="tab hidden">
      <h2 class="text-xl font-semibold mb-4">Temperature Converter (°C ↔ °F)</h2>

      <form onsubmit="convertTemperature(); return false;">

        <label class="font-semibold">Single Value</label>
        <input id="tempSingle" class="border p-2 w-full mb-3" />
        <p class="text-xs text-gray-500 mb-4">For a single conversion</p>

        <label class="font-semibold">Batch conversions (comma separated)</label>
        <input id="tempArray" class="border p-2 w-full mb-3" />
        <p class="text-xs text-gray-500 mb-4">For multiple conversions</p>

        <label class="font-semibold">Direction</label>
        <select id="tempDirection" class="border p-2 w-full mb-3">
          <option value="c-f">Celsius → Fahrenheit</option>
          <option value="f-c">Fahrenheit → Celsius</option>
        </select>

        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg">
          Convert
        </button>

        <p id="tempResult" class="mt-4 p-4 bg-green-50 border border-green-300 text-green-800 rounded-lg font-semibold">
        </p>

      </form>
    </div>


    <!-- LINK TO JS FILE -->
    <script src="conversions.js"></script>

</body>

</html>
