<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-cneter p-6">
  <div class="w-full max-w-md bg-white shadow-lg rounded-xl p-6">
    <h1 class="text-2xl font-semibold text-center mb-6">Conversion Calculator</h1>
    <form id="converter-form" class="space-y-4">
      <div>
        <label> Value</label>
        <input 
        type="number"
        id="Value"
        step="any"
        class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500"       
        required
        />
        
      </div>

      <div>
        <label class="block font-medium mb-1"> From</label>
        <select 
        id="from-unit"
        class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
        <option value="km">Kilometers</option>
        <option value="mi">Miles</option>
        </select>
      </div>

      <div>
        <label class="block font-medium mb-1"> To</label>
        <select id="to-unit" 
        class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
      <option value="mi">Miles</option>
      <option value="km">Kilometers</option>
    </select>
      </div>

      <button
      type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Convert</button>

    </form>
    <div id="result"></div>

  </div>
  
</body>
</html>
